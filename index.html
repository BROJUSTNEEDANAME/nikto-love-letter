<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>无名来信</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--text:#c8c0b0;--accent:#b4838d;--red:#dc2626;--dim:#555}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.game{max-width:640px;margin:0 auto;padding:40px 24px 100px;min-height:100vh}
.narr{font-size:14.5px;line-height:2.2;margin-bottom:20px;font-family:'Noto Serif SC',serif;opacity:0;transform:translateY(10px);transition:all .6s ease}
.narr.show{opacity:1;transform:translateY(0)}
.narr.red{color:var(--red)}.narr.dim{color:var(--dim)}.narr.accent{color:var(--accent)}
.narr.letter{background:#111;border:1px solid #222;border-radius:8px;padding:20px 24px;font-style:italic;color:#a89888;margin:16px 0}
.narr.big{font-size:18px;font-weight:700;letter-spacing:2px}
.narr.glitch{animation:gtxt .15s infinite}
@keyframes gtxt{0%{transform:translate(0)}25%{transform:translate(-2px,1px)}50%{transform:translate(1px,-1px)}75%{transform:translate(-1px,2px)}100%{transform:translate(2px,-1px)}}
.narr.flicker{animation:flk .1s infinite alternate}
@keyframes flk{from{opacity:1}to{opacity:.5}}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:24px;opacity:0;transition:opacity .5s ease}
.choices.show{opacity:1}
.ch{padding:14px 18px;border:1px solid #2a2a2a;border-radius:8px;cursor:pointer;font-size:13.5px;line-height:1.6;color:var(--text);transition:all .25s ease;font-family:'Noto Sans SC',sans-serif;background:transparent;text-align:left;width:100%}
.ch:hover{background:#1a1515;border-color:var(--accent);color:#eee}
.ch:active{transform:scale(.98)}
.ch.red-ch{border-color:var(--red);color:var(--red)}
.ch.red-ch:hover{background:#1a0808}
.ch.urgent{border-color:var(--red);color:var(--red);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.divider{width:60px;height:1px;background:#222;margin:30px auto}

.black-ov{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:500;display:none;justify-content:center;align-items:center;flex-direction:column;opacity:0;transition:opacity 1s ease}
.black-ov.on{display:flex}.black-ov.fade{opacity:1}
.ov-text{color:var(--text);font-size:15px;font-family:'Noto Serif SC',serif;line-height:2.5;text-align:center;opacity:0;transition:opacity 1.5s ease}
.ov-text.show{opacity:1}.ov-text.red{color:var(--red)}.ov-text.big{font-size:22px;font-weight:700}
.ov-text.glitch{animation:gtxt .12s infinite}

.js-ov{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:600;display:none;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:6vh}
.js-ov.on{display:flex}
.js-bg{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:top center;filter:brightness(.65) contrast(1.2);opacity:0;transition:opacity .15s ease}
.js-bg.flash{opacity:1}
.js-text-area{position:relative;z-index:2;text-align:center;padding:0 24px;max-width:500px}
.js-line{font-size:15px;font-family:'Noto Serif SC',serif;line-height:2.2;opacity:0;transition:opacity 1s ease;margin-bottom:8px;color:var(--red)}
.js-line.show{opacity:1}
.js-line.wh{color:#666;font-size:12px}
.js-line.fin{font-size:10px;color:#333;letter-spacing:2px;margin-top:20px}
.js-line.huge{font-size:20px;font-weight:700;letter-spacing:4px}
.js-line.glitch{animation:gtxt .1s infinite}
.js-line.flicker{animation:flk .08s infinite alternate}

@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-8px,2px)}20%{transform:translate(8px,-2px)}30%{transform:translate(-6px,4px)}40%{transform:translate(6px,-4px)}50%{transform:translate(-4px,2px)}60%{transform:translate(4px,-2px)}70%{transform:translate(-3px,1px)}80%{transform:translate(3px,-1px)}}
.shake{animation:shake .5s ease}
.shake-long{animation:shake .3s ease 3}

@keyframes screenFlash{0%{background:#fff}100%{background:#000}}
.flash-white{animation:screenFlash .1s ease}

.prog{position:fixed;top:0;left:0;height:2px;background:var(--accent);z-index:100;transition:width .5s ease}

.ambient-text{position:fixed;font-size:9px;color:rgba(185,28,28,.06);font-family:monospace;pointer-events:none;z-index:1;letter-spacing:1px}
</style>
</head>
<body>
<div class="prog" id="prog" style="width:0%"></div>
<div class="black-ov" id="blackOv"><div class="ov-text" id="ovText"></div></div>
<div class="js-ov" id="jsOv">
<div class="js-bg" id="jsBg"></div>
<div class="js-text-area" id="jsTA"></div>
</div>
<div class="game" id="game"></div>

var step=0,T=28;

function prog(){document.getElementById('prog').style.width=Math.min((step/T)*100,100)+'%';}
function clear(){game.innerHTML='';window.scrollTo({top:0});}

function N(t,cls,delay){
return new Promise(function(r){
setTimeout(function(){
var d=document.createElement('div');d.className='narr'+(cls?' '+cls:'');d.innerHTML=t;
game.appendChild(d);setTimeout(function(){d.classList.add('show');},50);r();
},delay||0);
});}

function C(ch){
return new Promise(function(r){
setTimeout(function(){
var div=document.createElement('div');div.className='choices';
ch.forEach(function(c){
var b=document.createElement('button');b.className='ch'+(c.cls?' '+c.cls:'');b.textContent=c.text;
b.addEventListener('click',function(){r(c.id);});div.appendChild(b);});
game.appendChild(div);setTimeout(function(){div.classList.add('show');},50);
},400);
});}

function D(){var d=document.createElement('div');d.className='divider';game.appendChild(d);}

function BS(lines){
return new Promise(function(r){
var ov=document.getElementById('blackOv'),txt=document.getElementById('ovText');
ov.classList.add('on');setTimeout(function(){ov.classList.add('fade');},50);
var i=0;
function nx(){
if(i<lines.length){
txt.innerHTML=lines[i].t;txt.className='ov-text'+(lines[i].cls?' '+lines[i].cls:'');
setTimeout(function(){txt.classList.add('show');},100);
var dur=lines[i].dur||2000;
setTimeout(function(){txt.classList.remove('show');i++;setTimeout(nx,400);},dur);
}else{setTimeout(function(){ov.classList.remove('fade');setTimeout(function(){ov.classList.remove('on');r();},1000);},500);}
}nx();});}

function W(ms){return new Promise(function(r){setTimeout(r,ms);});}

// Ambient creepy text that appears subtly
function addAmbient(text,x,y){
var d=document.createElement('div');d.className='ambient-text';
d.style.left=x+'%';d.style.top=y+'%';d.textContent=text;
document.body.appendChild(d);
setTimeout(function(){d.style.transition='opacity 8s ease';d.style.opacity='0';},3000);
}

// Screen flash
function flash(){
document.body.classList.add('flash-white');
setTimeout(function(){document.body.classList.remove('flash-white');},100);
}

function doShake(){document.body.classList.add('shake');setTimeout(function(){document.body.classList.remove('shake');},500);}

// JUMP SCARE with layered text on image
function JS(lines){
return new Promise(function(r){
var ov=document.getElementById('jsOv');
var bg=document.getElementById('jsBg');
var area=document.getElementById('jsTA');
bg.style.backgroundImage='url('+imgSrc+')';
area.innerHTML='';
ov.classList.add('on');

// Flash white then show image
flash();
setTimeout(function(){
bg.classList.add('flash');
doShake();
},100);

// Layered text
var i=0;
function nx(){
if(i<lines.length){
setTimeout(function(){
if(lines[i].shake)doShake();
if(lines[i].flash)flash();
var ln=document.createElement('div');
ln.className='js-line'+(lines[i].cls?' '+lines[i].cls:'');
ln.innerHTML=lines[i].t;
area.appendChild(ln);
setTimeout(function(){ln.classList.add('show');},50);
i++;nx();
},lines[i].delay||2000);
}else{
setTimeout(r,4000);
}
}
setTimeout(nx,1800);
});
}

async function intro(){
step=1;prog();clear();
await N('你下班回到家。','',0);

function JS(lines){
return new Promise(function(r){
var ov=document.getElementById('jsOv');
var bg=document.getElementById('jsBg');
var area=document.getElementById('jsTA');
bg.style.backgroundImage='url('+imgSrc+')';
area.innerHTML='';
ov.classList.add('on');

flash();
setTimeout(function(){bg.classList.add('flash');doShake();},100);

var i=0;
function nx(){
if(i<lines.length){
setTimeout(function(){
if(lines[i].shake)doShake();
if(lines[i].flash)flash();
if(lines[i].t){
var ln=document.createElement('div');
ln.className='js-line'+(lines[i].cls?' '+lines[i].cls:'');
ln.innerHTML=lines[i].t;
area.appendChild(ln);
setTimeout(function(){ln.classList.add('show');},50);
}
i++;nx();
},lines[i].delay||2000);
}else{setTimeout(r,5000);}
}
setTimeout(nx,1500);
});
}

function flash(){var d=document.createElement('div');d.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:999;pointer-events:none';document.body.appendChild(d);setTimeout(function(){d.remove();},80);}
function doShake(){document.body.classList.add('shake');setTimeout(function(){document.body.classList.remove('shake');},500);}

intro();
})();
</script>
